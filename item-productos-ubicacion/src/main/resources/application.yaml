spring:
  application:
    name: producto-service

  datasource:
    url: jdbc:mysql://${DATABASE_HOST:localhost}:3306/db_productos?createDatabaseIfNotExist=true
    username: root
    password:

  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

server:
  port: 0

springdoc:
  swagger-ui:
    path: /doc/swagger-ui/index.html
  api-docs:
    path: /api-docs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}